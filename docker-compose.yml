version: '3.8'

services:
  audioreader-web:
    build: .
    container_name: audioreader-next
    ports:
      - "3000:3000"
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - N8N_WEBHOOK_URL=http://n8n_zort:5678/webhook/
    networks:
      - n8n-zort_default

networks:
  n8n-zort_default:
    external: true
